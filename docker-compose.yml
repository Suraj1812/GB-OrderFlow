services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gb_orderflow
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gb_orderflow?schema=public
      CORS_ORIGINS: http://localhost:8080
      FRONTEND_ORIGIN: http://localhost:8080
      API_ORIGIN: http://localhost:4000
      ACCESS_TOKEN_SECRET: replace-me-access
      DOWNLOAD_TOKEN_SECRET: replace-me-download
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres-data:
